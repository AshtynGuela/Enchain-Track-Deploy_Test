<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enchain
        Track</title>
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/globals.css">
</head>

<body>
    <div class="login-page">                            <!-- Background-->
        <div class="login-container">                   <!-- Login container: title, form, and picture-->
            <div class="login-details-signup">          <!-- Login details-->
                <div class="login-label">
                    <div class="login-title">Enchain Track</div>
                    <div class="login-login">Sign Up</div>
                </div>

                <form id="signup-form" class="login-input" action="/signup" method="post">
                    <div class="main-input">
                        <div class="group">
                            <div class="rectangle">
                                <label class="input-label" for="username">Full Name*</label>
                                <input class="input-box" id="username" name="username" placeholder="Enter your full name" type="text" required>
                            </div>
                            <div class="rectangle">
                                <label class="input-label" for="phonenumber">Phone Number*</label>
                                <input class="input-box" id="phonenumber" name="phonenumber" placeholder="Enter your phone number" type="tel" required>
                            </div>
                        </div>

                        <div class="group">
                            <div class="rectangle">
                                <label class="input-label" for="password">Password*</label>
                                <input class="input-box" id="password" name="password" placeholder="Enter your password" type="password" required>
                            </div>
                            <div class="rectangle">
                                <label class="input-label" for="confirmPassword">Confirm Password*</label>
                                <input class="input-box" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" type="password" required> <!-- bug here, confirm-password check changed to confirmPassword to align with server.js check-->
                            </div>
                        </div>
                    </div>

                    <div class="bottom-section">
                        <button class="input-submit" type="submit">Sign Up</button>

                        <div class="signup-link">
                            <p class="signup-link-label"><span class="span">Already have an account?</span>
                                <a class="signup-link-text" href="/login.html"> Log in</a>
                            </p>
                        </div>
                    </div>
                    
                </form>
            </div>

            <div class="login-image"><img class="image" src="img/image-3.png" /></div>
        </div>
    </div>
    <script src="/global.js"></script>
    <script src="/login.js"></script>
</body>

</html>
