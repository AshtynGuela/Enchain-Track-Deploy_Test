<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-logo">EnchainTrack</div>
            <div class="header-actions">
                <div class="profile">
                    <div class="profile-name"></div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-sidebar">
                <div class="nav-links">
                    <button class="link">
                        <img class="nav-img" src="/img/home.png" />
                        <div class="nav-title">Dashboard</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/inventory.png" />
                        <div class="nav-title">Inventory</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/browse.png" />
                        <div class="nav-title">Products</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/cart.png" />
                        <div class="nav-title">Sales</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/order.png" />
                        <div class="nav-title">Orders</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/business.png" />
                        <div class="nav-title">Supplier</div>
                    </button>
                </div>
                <div class="navigation-indicator" style="top: 25px;"></div> <!--Adjust top to: 25px + 65*(order of link - 1)-->
            </div>

            <div class="dashboard-main-data">
                <div class="title-line">
                    <div class="dashboard-title">Hello, Admin!</div>
                </div>

                <div class="dashboard-summary">
                    <div class="dashboard-data-card">
                        <div class="data-card-title">Revenue</div>
                        <div class="data-card-data" id="dashboardRevenue"></div>
                    </div>

                    <div class="dashboard-data-card">
                        <div class="data-card-title">Sales</div>
                        <div class="data-card-data" id="dashboardSales"></div>
                    </div>

                    <div class="dashboard-data-card">
                        <div class="data-card-title">Purchases</div>
                        <div class="data-card-data" id="dashboardItems"></div>
                    </div>

                    <div class="dashboard-data-card">
                        <div class="data-card-title">Customers</div>
                        <div class="data-card-data" id="dashboardCustomers"></div>
                    </div>
                </div>

                <div class="dashboard-table-group">
                    <div class="stock-alerts">
                        <div class="title-line">
                            <div class="table-title">Stock Alert</div>
                        </div>
                        <div class="cart-table-wrapper">
                            <table class="product-table">
                                <thead>
                                    <tr>
                                        <th data-type="text">Product</th>
                                        <th data-type="text">Type</th>
                                        <th class="text-center" data-type="number">Stock</th>
                                        <th data-type="text">Supplier</th>
                                    </tr>
                                </thead>
                                <tbody id="stockAlertsBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="top-selling-products">
                        <div class="title-line">
                            <div class="table-title">Top Selling Products</div>
                        </div>
                        <div class="cart-table-wrapper">
                            <table class="product-table">
                                <thead>
                                    <tr>
                                        <th data-type="text">Product</th>
                                        <th class="text-center" data-type="number">Units</th>
                                        <th class="text-right" data-type="currency">Revenue</th>
                                    </tr>
                                </thead>
                                <tbody id="topProductsBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/dashboard.js?v=1" defer></script>
    <script src="/global.js" defer></script>
</body>

</html>
