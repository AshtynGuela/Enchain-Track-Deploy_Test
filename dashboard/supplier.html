<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-logo">EnchainTrack</div>
            <div class="header-actions">
                <div class="profile">
                    <div class="profile-name"></div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-sidebar">
                <div class="nav-links">
                    <button class="link">
                        <img class="nav-img" src="/img/home.png" />
                        <div class="nav-title">Dashboard</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/inventory.png" />
                        <div class="nav-title">Inventory</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/browse.png" />
                        <div class="nav-title">Products</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/cart.png" />
                        <div class="nav-title">Sales</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/order.png" />
                        <div class="nav-title">Orders</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/business.png" />
                        <div class="nav-title">Supplier</div>
                    </button>
                </div>
                <div class="navigation-indicator" style="top: 350px;"></div> <!--Adjust top to: 25px + 65*(order of link - 1)-->
            </div>

            <div class="dashboard-main-data">
                <div class="title-line">
                    <div class="dashboard-title">Supplier Product Report</div>
                </div>
                <div class="cart-table-wrapper">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Supplier</th>
                                <th>Contact</th>
                                <th class="text-center">Goods</th>
                                <th class="text-center">Products</th>
                            </tr>
                        </thead>
                        <tbody id="suppliersBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="/dashboard.js?v=1" defer></script>
    <script src="/global.js" defer></script>
</body>

</html>
